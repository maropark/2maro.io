<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Notebook page -->
  <rect x="6" y="3" width="20" height="26" rx="1" fill="#F5F0E8" stroke="#D4C5A9" stroke-width="1"/>
  <!-- Red margin line -->
  <line x1="11" y1="3" x2="11" y2="29" stroke="#E8A0A0" stroke-width="0.5"/>
  <!-- Ruled lines -->
  <line x1="8" y1="10" x2="24" y2="10" stroke="#D4C5A9" stroke-width="0.3"/>
  <line x1="8" y1="14" x2="24" y2="14" stroke="#D4C5A9" stroke-width="0.3"/>
  <line x1="8" y1="18" x2="24" y2="18" stroke="#D4C5A9" stroke-width="0.3"/>
  <line x1="8" y1="22" x2="24" y2="22" stroke="#D4C5A9" stroke-width="0.3"/>
  <!-- "2" text in stamp red -->
  <text x="16" y="20" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#C1440E" text-anchor="middle" dominant-baseline="central">2</text>
  <!-- Spiral binding dots -->
  <circle cx="6" cy="8" r="1.2" fill="#6B6B6B"/>
  <circle cx="6" cy="16" r="1.2" fill="#6B6B6B"/>
  <circle cx="6" cy="24" r="1.2" fill="#6B6B6B"/>
</svg>
